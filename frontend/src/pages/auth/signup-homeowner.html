<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up as Homeowner - HomePro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/assets/css/main.css" />
    <script>tailwind.config = { theme: { extend: { colors: { "primary": "#137fec", "background-light": "#f6f7f8" }, fontFamily: { "display": ["Inter", "sans-serif"] } } } }</script>
</head>

<body class="bg-background-light font-display min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/src/pages/auth/login.html" class="flex items-center justify-center gap-3 mb-4">
                <span class="material-symbols-outlined text-primary text-4xl">home_repair_service</span>
                <h1 class="text-3xl font-bold text-slate-900">HomePro</h1>
            </a>
        </div>
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
            <h2 class="text-xl font-bold text-slate-900 mb-2">Create Homeowner Account</h2>
            <p class="text-sm text-slate-500 mb-6">Find and hire trusted home service professionals</p>
            <div id="regError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-lg mb-4">
            </div>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Profile Avatar (Optional)</label>
                    <input id="avatar" type="file" accept="image/*"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
                    <input id="name" type="text" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                        placeholder="John Doe" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input id="email" type="email" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                        placeholder="you@example.com" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
                    <input id="phone" type="tel"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                        placeholder="555-0100" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Location</label>
                    <input id="location" type="text"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                        placeholder="City, State" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input id="password" type="password" required minlength="6"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                        placeholder="Min 6 characters" />
                </div>
                <button type="submit" id="regBtn"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg transition-colors">Create
                    Account</button>
            </form>

            <!-- OTP Verification Section -->
            <div id="otpSection" class="hidden space-y-4">
                <p class="text-sm text-slate-600 mb-4 text-center">We've sent a 6-digit code to your email. Please enter
                    it below to verify your account.</p>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">One-Time Password (OTP)</label>
                    <input id="otpInput" type="text" maxlength="6" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm tracking-[0.5em] text-center font-bold"
                        placeholder="••••••" />
                </div>
                <button type="button" id="verifyBtn"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg transition-colors">Verify
                    OTP</button>
                <div class="text-center mt-2">
                    <button type="button" id="resendBtn" class="text-primary text-sm hover:underline">Resend
                        OTP</button>
                </div>
            </div>

            <p class="mt-4 text-center text-sm text-slate-500">Already have an account? <a
                    href="/src/pages/auth/login.html" class="text-primary font-semibold hover:underline">Sign in</a></p>
            <p class="mt-2 text-center text-sm text-slate-500">Want to offer services? <a
                    href="/src/pages/auth/signup-worker.html" class="text-primary font-semibold hover:underline">Sign up
                    as Worker</a></p>
        </div>
    </div>
    <script src="/src/assets/js/api.js"></script>
    <script src="/src/assets/js/auth.js"></script>
    <script>
        let registeredEmail = '';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errDiv = document.getElementById('regError');
            btn.disabled = true; btn.textContent = 'Creating...';
            errDiv.classList.add('hidden');
            try {
                const formData = new FormData();
                formData.append('role', 'homeowner');
                formData.append('name', document.getElementById('name').value);
                registeredEmail = document.getElementById('email').value;
                formData.append('email', registeredEmail);
                formData.append('phone', document.getElementById('phone').value);
                formData.append('location', document.getElementById('location').value);
                formData.append('password', document.getElementById('password').value);

                const avatarFile = document.getElementById('avatar').files[0];
                if (avatarFile) formData.append('avatarFile', avatarFile);

                await register(formData);
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
            } catch (err) {
                errDiv.textContent = err.message; errDiv.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });

        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('verifyBtn');
            const errDiv = document.getElementById('regError');
            const otp = document.getElementById('otpInput').value;
            if (!otp) return;

            btn.disabled = true; btn.textContent = 'Verifying...';
            errDiv.classList.add('hidden');

            try {
                await verifyOtp(registeredEmail, otp);
                // redirectByRole handles the navigation on success
            } catch (err) {
                errDiv.textContent = err.message; errDiv.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'Verify OTP';
            }
        });

        document.getElementById('resendBtn').addEventListener('click', async () => {
            const errDiv = document.getElementById('regError');
            try {
                await resendOtp(registeredEmail);
                alert('OTP sent successfully!');
            } catch (err) {
                errDiv.textContent = err.message; errDiv.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
