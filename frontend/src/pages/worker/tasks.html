<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Jobs - HomePro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/assets/css/main.css" />
    <script>tailwind.config = { theme: { extend: { colors: { "primary": "#137fec", "background-light": "#f6f7f8" }, fontFamily: { "display": ["Inter", "sans-serif"] } } } }</script>
</head>

<body class="bg-background-light font-display text-slate-900 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-200 flex flex-col h-full">
            <div class="flex items-center gap-3 px-6 py-6 border-b border-slate-200">
                <span class="material-symbols-outlined text-primary text-2xl">home_repair_service</span>
                <h2 class="text-xl font-bold">HomePro</h2>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2">
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 font-medium"
                    href="/src/pages/worker/dashboard.html"><span
                        class="material-symbols-outlined">home</span>Dashboard</a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg bg-primary/10 text-primary font-medium"
                    href="#"><span class="material-symbols-outlined">work</span>My Jobs</a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 font-medium"
                    href="/src/pages/worker/earnings.html"><span
                        class="material-symbols-outlined">payments</span>Earnings</a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 font-medium"
                    href="/src/pages/chat/chat-page.html"><span
                        class="material-symbols-outlined">chat</span>Messages</a>
            </nav>
            <div class="p-4"><a onclick="logout()"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:text-red-600 font-medium cursor-pointer"><span
                        class="material-symbols-outlined">logout</span>Log Out</a></div>
        </aside>
        <main class="flex-1 overflow-y-auto p-8">
            <h1 class="text-3xl font-bold mb-6">My Jobs</h1>
            <div id="jobsList" class="space-y-4">
                <div class="text-center py-12">
                    <div class="spinner mx-auto"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/src/assets/js/api.js"></script>
    <script src="/src/assets/js/auth.js"></script>
    <script>
        if (!requireAuth() || !requireRole('worker')) throw 'Access denied';
        async function loadJobs() {
            const data = await api.get('/tasks');
            const tasks = data.tasks || [];
            const statusColors = { pending: 'bg-amber-100 text-amber-800', accepted: 'bg-blue-100 text-blue-800', in_progress: 'bg-green-100 text-green-800', completed: 'bg-emerald-100 text-emerald-800' };
            if (tasks.length === 0) { document.getElementById('jobsList').innerHTML = '<p class="text-slate-400 text-center py-12">No jobs yet</p>'; return; }
            document.getElementById('jobsList').innerHTML = tasks.map(t => {
                let actions = '';
                if (t.status === 'pending') actions = `<button onclick="act('${t.id}','accept')" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary/90">Accept</button>`;
                if (t.status === 'accepted') actions = `<button onclick="act('${t.id}','start')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">Start Timer</button>`;
                if (t.status === 'in_progress') actions = `<button onclick="act('${t.id}','complete')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700">Mark Complete</button>`;
                return `<div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex justify-between items-center">
      <div><h3 class="font-bold">${t.service_type}</h3><p class="text-sm text-slate-500">${t.homeowner_name} • ${t.scheduled_date || 'TBD'} ${t.scheduled_time || ''}</p>
      <span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium mt-2 ${statusColors[t.status] || ''}">${t.status.replace('_', ' ')}</span>
      ${t.payment_amount ? `<span class="text-sm font-medium text-slate-900 ml-2">$${t.payment_amount}</span>` : ''}</div>
      <div class="flex gap-2">${actions}<a href="/src/pages/chat/chat-page.html?userId=${t.homeowner_id}" class="border border-slate-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">Chat</a></div>
    </div>`;
            }).join('');
        }
        async function act(id, action) {
            try { await api.put(`/tasks/${id}/${action}`); showToast(`Task ${action}ed!`, 'success'); loadJobs(); }
            catch (err) { showToast(err.message, 'error'); }
        }
        loadJobs();
    </script>
</body>

</html>
