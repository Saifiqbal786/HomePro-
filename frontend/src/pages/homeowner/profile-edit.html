<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Edit Profile - HomePro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/assets/css/main.css" />
    <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#137fec", "background-light": "#f6f7f8", "background-dark": "#101922" }, fontFamily: { "display": ["Inter", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }</script>
</head>

<body class="bg-background-light font-display text-slate-900 min-h-screen">
    <div class="flex flex-col h-screen">
        <!-- HEADER -->
        <header
            class="flex items-center justify-between border-b border-slate-200 bg-white px-10 py-3 sticky top-0 z-50">
            <a class="flex items-center gap-2 text-primary" href="/src/pages/homeowner/search-workers.html">
                <span class="material-symbols-outlined text-2xl">home_repair_service</span>
                <h2 class="text-xl font-bold">HomePro</h2>
            </a>
            <nav class="flex items-center gap-6">
                <a class="text-sm font-medium text-slate-600 hover:text-primary"
                    href="/src/pages/homeowner/search-workers.html">Find Workers</a>
                <a class="text-sm font-medium text-slate-600 hover:text-primary"
                    href="/src/pages/chat/chat-page.html">Messages</a>
                <a class="text-sm font-medium text-slate-600 hover:text-primary"
                    href="/src/pages/homeowner/task-history.html">My Bookings</a>
                <div id="headerAvatar"
                    class="size-10 rounded-full bg-slate-200 overflow-hidden cursor-pointer border border-slate-200"
                    onclick="logout()"></div>
            </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-3xl mx-auto">
                <h1 class="text-3xl font-bold mb-8">Account Settings</h1>

                <div id="profileError"
                    class="hidden bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-lg mb-6"></div>

                <form id="profileForm" class="space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <!-- Profile Picture -->
                    <div class="flex items-center gap-6">
                        <div id="avatarPreview"
                            class="w-24 h-24 rounded-full bg-slate-200 overflow-hidden shrink-0 border-2 border-slate-100 shadow-sm">
                            <span
                                class="material-symbols-outlined text-4xl text-slate-400 h-full w-full flex items-center justify-center">person</span>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-sm font-semibold text-slate-900 mb-2">Profile Picture</label>
                            <input id="avatarInput" type="file" accept="image/*"
                                class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition-all cursor-pointer" />
                            <p class="text-xs text-slate-500">JPG, WebP or PNG. Max size 5MB.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-slate-900 mb-2">Full Name</label>
                            <input id="name" type="text" required
                                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-900 mb-2">Email Address</label>
                            <input id="email" type="email" disabled
                                class="w-full px-4 py-2.5 border border-slate-200 bg-slate-50 text-slate-500 rounded-lg text-sm cursor-not-allowed" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-900 mb-2">Phone Number</label>
                            <input id="phone" type="tel"
                                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm" />
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-slate-900 mb-2">Location</label>
                            <input id="location" type="text"
                                class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                                placeholder="City, State" />
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 flex justify-end gap-3">
                        <button type="submit" id="saveBtn"
                            class="bg-primary hover:bg-primary/90 text-white font-semibold py-2.5 px-6 rounded-lg transition-all shadow-md shadow-primary/20 hover:shadow-lg active:scale-95">Save
                            Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/src/assets/js/api.js"></script>
    <script src="/src/assets/js/auth.js"></script>
    <script>
        if (!requireAuth()) throw 'Access denied';
        const user = getUser();

        function syncUI() {
            document.getElementById('name').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('location').value = user.location || '';
            if (user.avatar) {
                const img = `<img src="${user.avatar}" class="w-full h-full object-cover"/>`;
                document.getElementById('avatarPreview').innerHTML = img;
                document.getElementById('headerAvatar').innerHTML = img;
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const errDiv = document.getElementById('profileError');
            btn.disabled = true; btn.textContent = 'Saving...';
            errDiv.classList.add('hidden');

            try {
                let avatarUrl = user.avatar;
                const file = document.getElementById('avatarInput').files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append('image', file);
                    const uploadRes = await api.postForm('/upload/image', formData);
                    avatarUrl = uploadRes.url;
                }

                // Note: Homeowners don't have a separate WorkerProfile, but we can still update their base User data
                // We'll use the same generic update endpoint if it exists or create a homeowner specific one.
                // Assuming /api/auth/profile or /api/homeowner/profile
                // Based on previous patterns, let's check homeowner routes or add one.
                await api.put('/homeowner/profile', {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    location: document.getElementById('location').value,
                    avatar: avatarUrl
                });

                // Update local user data
                const updatedUser = {
                    ...user,
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    location: document.getElementById('location').value,
                    avatar: avatarUrl
                };
                setUser(updatedUser);

                showToast('Profile updated successfully!', 'success');
                setTimeout(() => window.location.reload(), 1500);
            } catch (err) {
                errDiv.textContent = err.message; errDiv.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'Save Changes';
            }
        });

        syncUI();
    </script>
</body>

</html>
