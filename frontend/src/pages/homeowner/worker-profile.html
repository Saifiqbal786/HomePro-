<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Worker Profile - HomePro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Flatpickr for Date Selection -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <link rel="stylesheet" href="/src/assets/css/main.css" />
  <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#137fec", "background-light": "#f6f7f8" }, fontFamily: { "display": ["Inter", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }</script>
</head>

<body class="bg-background-light font-display text-slate-900">
  <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <!-- HEADER -->
    <header
      class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 px-10 py-3 bg-white sticky top-0 z-50">
      <div class="flex items-center gap-8">
        <a class="flex items-center gap-2 text-primary" href="/src/pages/homeowner/search-workers.html">
          <span class="material-symbols-outlined text-2xl">home_repair_service</span>
          <h2 class="text-lg font-bold">HomePro</h2>
        </a>
      </div>
      <div class="flex items-center gap-6">
        <a class="text-sm font-medium hover:text-primary text-slate-600"
          href="/src/pages/homeowner/search-workers.html">Find Workers</a>
        <a class="text-sm font-medium hover:text-primary text-slate-600"
          href="/src/pages/chat/chat-page.html">Messages</a>
        <a class="text-sm font-medium hover:text-primary text-slate-600"
          href="/src/pages/homeowner/task-history.html">My Jobs</a>
        <div id="userAvatar" class="size-10 rounded-full bg-slate-200 overflow-hidden cursor-pointer"
          onclick="logout()"></div>
      </div>
    </header>

    <div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-8">
      <div id="profileContent" class="flex flex-col max-w-[1200px] w-full gap-8">
        <div class="text-center py-12">
          <div class="spinner mx-auto"></div>
          <p class="mt-4 text-slate-500">Loading profile...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- HIRE MODAL -->
  <div id="hireModal" class="hidden modal-backdrop">
    <div class="modal-content max-w-md">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><span
          class="material-symbols-outlined text-primary">assignment_turned_in</span>Hire Worker</h3>
      <form id="hireForm" class="space-y-4">
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Service Type</label>
          <select id="hireService" required
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg bg-white text-sm">
          </select>
        </div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
          <textarea id="hireDesc" rows="2" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm"
            placeholder="Describe what you need done"></textarea>
        </div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Location</label>
          <input id="hireLoc" type="text" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm"
            placeholder="123 Main St" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
            <input id="hireDate" type="text" required placeholder="Select Date"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm bg-white cursor-pointer" />
          </div>
          <div><label class="block text-sm font-medium text-slate-700 mb-1">Time</label>
            <input id="hireTime" type="time" required
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm" />
          </div>
        </div>
        <p id="hireRate" class="text-sm text-slate-500"></p>
        <div class="flex gap-3 mt-6">
          <button type="button" onclick="closeHireModal()"
            class="flex-1 py-2.5 border border-slate-300 rounded-lg font-medium text-slate-700 hover:bg-slate-50 transition-colors">Cancel</button>
          <button type="submit" id="hireBtn"
            class="flex-1 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition-colors">Send
            Request</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/src/assets/js/api.js"></script>
  <script src="/src/assets/js/auth.js"></script>
  <script>
    if (!requireAuth()) throw 'Auth required';
    const workerId = new URLSearchParams(window.location.search).get('id');
    if (!workerId) { window.location.href = '/src/pages/homeowner/search-workers.html'; throw 'No ID'; }

    let workerData = null;
    let datePicker = null;

    const parseSafe = (str) => {
      try {
        if (!str) return [];
        let parsed = typeof str === 'string' ? JSON.parse(str) : str;
        if (typeof parsed === 'string') parsed = JSON.parse(parsed);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) { return []; }
    };

    async function loadProfile() {
      try {
        const data = await api.get(`/workers/${workerId}`);
        workerData = data.profile;
        renderProfile(data.profile, data.reviews);
      } catch (err) {
        document.getElementById('profileContent').innerHTML = '<div class="text-center py-12 text-red-500">Worker not found</div>';
      }
    }

    function renderStars(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += `<span class="material-symbols-outlined text-amber-400 text-lg" style="font-variation-settings:'FILL' ${i <= Math.round(rating) ? 1 : 0}">star</span>`;
      }
      return stars;
    }

    function renderProfile(p, reviews) {
      const skills = parseSafe(p.skills);
      const services = parseSafe(p.services);
      const credentials = parseSafe(p.credentials);

      document.title = `${p.name} - HomePro`;

      document.getElementById('profileContent').innerHTML = `
    <!-- Profile Header -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6 items-center md:items-start justify-between">
      <div class="flex flex-col md:flex-row gap-6 items-center md:items-start text-center md:text-left">
        <div class="relative">
          <img src="${p.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=137fec&color=fff&size=128`}" class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover"/>
          ${p.is_verified ? '<div class="absolute bottom-0 right-0 bg-white rounded-full p-1"><span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:\'FILL\' 1">verified</span></div>' : ''}
        </div>
        <div class="pt-2">
          <h1 class="text-3xl font-bold">${p.name}</h1>
          <p class="text-slate-600 text-lg mt-1 flex items-center justify-center md:justify-start gap-2"><span class="material-symbols-outlined text-sm">handyman</span>${services.join(', ')}</p>
          <div class="flex items-center gap-4 mt-3 text-slate-500 text-sm">
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">work_history</span>${p.experience_years} Years Exp.</span>
            <span>•</span>
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">location_on</span>${p.location || 'N/A'}</span>
          </div>
          <div class="flex items-center gap-2 mt-3">
            ${renderStars(p.rating)}
            <span class="font-medium">${p.rating}</span>
            <span class="text-slate-400">(${p.total_reviews} reviews)</span>
          </div>
        </div>
      </div>
      <div class="flex flex-col gap-3 w-full md:w-auto">
        <a href="/src/pages/chat/chat-page.html?userId=${p.worker_id}" class="flex items-center justify-center rounded-lg h-12 px-8 bg-primary text-white font-bold hover:bg-primary/90 transition-colors gap-2 shadow-sm">
          <span class="material-symbols-outlined">chat</span>Message ${p.name.split(' ')[0]}
        </a>
        <button onclick="openHireModal()" class="flex items-center justify-center rounded-lg h-12 px-8 bg-slate-100 text-slate-900 font-bold hover:bg-slate-200 transition-colors gap-2">
          <span class="material-symbols-outlined">assignment_turned_in</span>Hire Now
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 flex flex-col gap-8">
        <!-- About -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">person</span>About Me</h2>
          <p class="text-slate-600 leading-relaxed">${p.bio || 'No bio provided.'}</p>
        </div>
        <!-- Skills -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">handyman</span>Skills & Expertise</h2>
          <div class="flex flex-wrap gap-2">
            ${skills.map(s => `<span class="bg-primary/10 text-primary px-3 py-1.5 rounded-full text-sm font-medium">${s}</span>`).join('')}
          </div>
        </div>
        <!-- Reviews -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">reviews</span>Reviews</h2>
          ${reviews.length === 0 ? '<p class="text-slate-500">No reviews yet.</p>' : reviews.map(r => `
            <div class="py-4 border-b border-slate-100 last:border-0">
              <div class="flex justify-between items-start mb-2">
                <span class="font-medium text-sm">${r.homeowner_name}</span>
                <div class="flex text-amber-400">${renderStars(r.rating)}</div>
              </div>
              <p class="text-sm text-slate-600">${r.comment || ''}</p>
              <span class="text-xs text-slate-400 mt-2 block">${new Date(r.created_at).toLocaleDateString()}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <!-- Right Column -->
      <div class="flex flex-col gap-8">
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <h2 class="text-lg font-bold mb-4">Quick Stats</h2>
          <div class="space-y-4">
            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
              <div class="flex items-center gap-3"><div class="bg-primary/10 p-2 rounded-lg text-primary"><span class="material-symbols-outlined">payments</span></div><span class="text-slate-700 font-medium">Hourly Rate</span></div>
              <span class="font-bold text-lg">$${p.hourly_rate}</span>
            </div>
            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
              <div class="flex items-center gap-3"><div class="bg-primary/10 p-2 rounded-lg text-primary"><span class="material-symbols-outlined">task_alt</span></div><span class="text-slate-700 font-medium">Jobs Completed</span></div>
              <span class="font-bold text-lg">${p.total_jobs}</span>
            </div>
            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
              <div class="flex items-center gap-3"><div class="bg-primary/10 p-2 rounded-lg text-primary"><span class="material-symbols-outlined">group_add</span></div><span class="text-slate-700 font-medium">Total Reviews</span></div>
              <span class="font-bold text-lg">${p.total_reviews}</span>
            </div>
          </div>
        </div>
        ${credentials.length > 0 ? `
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <h2 class="text-lg font-bold mb-4">Credentials</h2>
          <ul class="space-y-3">
            ${credentials.map(c => `<li class="flex items-center gap-2 text-slate-700"><span class="material-symbols-outlined text-green-500">check_circle</span>${c}</li>`).join('')}
          </ul>
        </div>` : ''}
      </div>
    </div>
  `;
    }

    function openHireModal() {
      if (!workerData) return;
      const services = parseSafe(workerData.services);
      const serviceSelect = document.getElementById('hireService');

      serviceSelect.innerHTML = services.length > 0
        ? services.map(s => `<option value="${s.replace(/"/g, '&quot;')}">${s}</option>`).join('')
        : '<option value="General">General</option>';

      document.getElementById('hireRate').textContent = `Rate: $${workerData.hourly_rate}/hr`;

      // Initialize Flatpickr with blocked dates
      const availability = JSON.parse(workerData.availability || '{}');
      const blockedDates = availability.blocked_dates || [];

      if (datePicker) {
        datePicker.destroy();
      }

      datePicker = flatpickr("#hireDate", {
        minDate: "today",
        disable: blockedDates,
        dateFormat: "Y-m-d",
        placeholder: "Select an available date"
      });

      document.getElementById('hireModal').classList.remove('hidden');

      // Fix modal overflow issues with datepicker
      document.body.style.overflow = 'hidden';
    }

    function closeHireModal() {
      document.getElementById('hireModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.getElementById('hireForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('hireBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        await api.post('/tasks', {
          worker_id: workerId,
          service_type: document.getElementById('hireService').value,
          description: document.getElementById('hireDesc').value,
          location: document.getElementById('hireLoc').value,
          scheduled_date: document.getElementById('hireDate').value,
          scheduled_time: document.getElementById('hireTime').value,
        });
        showToast('Hire request sent successfully!', 'success');
        closeHireModal();
      } catch (err) {
        showToast(err.message, 'error');
      }
      btn.disabled = false; btn.textContent = 'Send Request';
    });

    loadProfile();
  </script>
</body>

</html>
