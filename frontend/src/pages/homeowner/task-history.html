<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Bookings - HomePro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/assets/css/main.css" />
    <script>tailwind.config = { theme: { extend: { colors: { "primary": "#137fec", "background-light": "#f6f7f8" }, fontFamily: { "display": ["Inter", "sans-serif"] } } } }</script>
</head>

<body class="bg-background-light font-display text-slate-900 min-h-screen">
    <header
        class="flex items-center justify-between border-b border-slate-200 bg-white px-6 lg:px-10 py-3 sticky top-0 z-50">
        <a class="flex items-center gap-2 text-primary" href="/src/pages/homeowner/search-workers.html">
            <span class="material-symbols-outlined text-2xl">home_repair_service</span>
            <h2 class="text-xl font-bold hidden sm:block">HomePro</h2>
        </a>
        <nav class="flex items-center gap-6">
            <a class="text-sm font-medium text-slate-600 hover:text-primary"
                href="/src/pages/homeowner/search-workers.html">Find Workers</a>
            <a class="text-sm font-medium text-slate-600 hover:text-primary"
                href="/src/pages/chat/chat-page.html">Messages</a>
            <a class="text-sm font-medium text-primary" href="#">My Bookings</a>
            <div class="size-10 rounded-full bg-slate-200 overflow-hidden cursor-pointer" onclick="logout()"><span
                    class="material-symbols-outlined text-slate-500 mt-2 ml-2">person</span></div>
        </nav>
    </header>
    <main class="max-w-5xl mx-auto p-6 space-y-6">
        <h1 class="text-3xl font-bold">My Bookings</h1>
        <div class="flex gap-2 mb-4">
            <button onclick="filterTasks('')" class="px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white"
                id="filterAll">All</button>
            <button onclick="filterTasks('pending')"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200"
                id="filterPending">Pending</button>
            <button onclick="filterTasks('accepted')"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200"
                id="filterAccepted">Accepted</button>
            <button onclick="filterTasks('in_progress')"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200"
                id="filterInProgress">In Progress</button>
            <button onclick="filterTasks('completed')"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200"
                id="filterCompleted">Completed</button>
        </div>
        <div id="tasksList" class="space-y-4">
            <div class="text-center py-12">
                <div class="spinner mx-auto"></div>
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="hidden modal-backdrop">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Leave a Review</h3>
            <form id="reviewForm" class="space-y-4">
                <input type="hidden" id="reviewWorkerId" /><input type="hidden" id="reviewTaskId" />
                <div><label class="block text-sm font-medium mb-2">Rating</label>
                    <div id="starPicker" class="flex gap-1 text-3xl cursor-pointer">
                        <span onclick="pickStar(1)" class="text-slate-300 hover:text-amber-400">★</span>
                        <span onclick="pickStar(2)" class="text-slate-300 hover:text-amber-400">★</span>
                        <span onclick="pickStar(3)" class="text-slate-300 hover:text-amber-400">★</span>
                        <span onclick="pickStar(4)" class="text-slate-300 hover:text-amber-400">★</span>
                        <span onclick="pickStar(5)" class="text-slate-300 hover:text-amber-400">★</span>
                    </div>
                </div>
                <div><label class="block text-sm font-medium mb-1">Comment</label>
                    <textarea id="reviewComment" rows="3"
                        class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm"
                        placeholder="How was the service?"></textarea>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="document.getElementById('reviewModal').classList.add('hidden')"
                        class="flex-1 py-2.5 border border-slate-300 rounded-lg font-medium">Cancel</button>
                    <button type="submit"
                        class="flex-1 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90">Submit
                        Review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/src/assets/js/api.js"></script>
    <script src="/src/assets/js/auth.js"></script>
    <script>
        if (!requireAuth()) throw 'Auth required';
        let allTasks = [];
        let currentFilter = '';
        let selectedRating = 0;

        function pickStar(n) {
            selectedRating = n;
            document.querySelectorAll('#starPicker span').forEach((s, i) => {
                s.className = i < n ? 'text-amber-400 cursor-pointer' : 'text-slate-300 hover:text-amber-400 cursor-pointer';
            });
        }

        async function loadTasks() {
            try {
                const data = await api.get('/tasks');
                allTasks = data.tasks || [];
                renderTasks();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function filterTasks(status) {
            currentFilter = status;
            document.querySelectorAll('[id^="filter"]').forEach(b => b.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200');
            const btnId = status ? `filter${status.charAt(0).toUpperCase() + status.slice(1).replace('_', '')}` : 'filterAll';
            const btn = document.getElementById(btnId) || document.getElementById('filterAll');
            if (btn) btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white';
            renderTasks();
        }

        function renderTasks() {
            const filtered = currentFilter ? allTasks.filter(t => t.status === currentFilter) : allTasks;
            const el = document.getElementById('tasksList');
            if (filtered.length === 0) { el.innerHTML = '<div class="text-center py-12 text-slate-400"><span class="material-symbols-outlined text-4xl block mb-2">inbox</span>No tasks found</div>'; return; }
            const statusColors = { pending: 'bg-amber-100 text-amber-800', accepted: 'bg-blue-100 text-blue-800', in_progress: 'bg-green-100 text-green-800', completed: 'bg-emerald-100 text-emerald-800', cancelled: 'bg-red-100 text-red-800' };
            el.innerHTML = filtered.map(t => `
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
      <div class="flex justify-between items-start mb-3">
        <div>
          <h3 class="font-bold text-lg">${t.service_type}</h3>
          <p class="text-sm text-slate-500">${t.description || 'No description'}</p>
        </div>
        <span class="inline-flex px-3 py-1 rounded-full text-xs font-medium ${statusColors[t.status] || ''}">${t.status.replace('_', ' ')}</span>
      </div>
      <div class="flex flex-wrap gap-4 text-sm text-slate-600">
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">person</span>${t.worker_name}</span>
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">event</span>${t.scheduled_date || 'TBD'} ${t.scheduled_time || ''}</span>
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">payments</span>$${t.hourly_rate}/hr</span>
        ${t.payment_amount ? `<span class="font-medium text-slate-900">Total: $${t.payment_amount}</span>` : ''}
      </div>
      <div class="flex gap-2 mt-4 flex-wrap">
        <a href="/src/pages/chat/chat-page.html?userId=${t.worker_id}" class="text-sm text-primary hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">chat</span>Message</a>
        ${t.status === 'in_progress' ? `<a href="/src/pages/homeowner/track-worker.html?workerId=${t.worker_id}&taskId=${t.id}" class="text-sm text-emerald-600 hover:underline flex items-center gap-1 ml-4"><span class="material-symbols-outlined text-[16px]">location_on</span>Track Worker</a>` : ''}
        ${t.status === 'completed' ? `<button onclick="openReview('${t.worker_id}','${t.id}')" class="text-sm text-primary hover:underline flex items-center gap-1 ml-4"><span class="material-symbols-outlined text-[16px]">star</span>Review</button>` : ''}
        ${t.status === 'completed' && t.payment_amount ? `<button onclick="confirmPayment('${t.id}')" class="text-sm text-green-600 hover:underline flex items-center gap-1 ml-4"><span class="material-symbols-outlined text-[16px]">check_circle</span>Confirm Payment</button>` : ''}
      </div>
    </div>
  `).join('');
        }

        function openReview(workerId, taskId) {
            document.getElementById('reviewWorkerId').value = workerId;
            document.getElementById('reviewTaskId').value = taskId;
            selectedRating = 0;
            document.querySelectorAll('#starPicker span').forEach(s => s.className = 'text-slate-300 hover:text-amber-400 cursor-pointer');
            document.getElementById('reviewComment').value = '';
            document.getElementById('reviewModal').classList.remove('hidden');
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedRating === 0) { showToast('Please select a rating', 'error'); return; }
            try {
                await api.post('/reviews', {
                    worker_id: document.getElementById('reviewWorkerId').value,
                    task_id: document.getElementById('reviewTaskId').value,
                    rating: selectedRating,
                    comment: document.getElementById('reviewComment').value,
                });
                showToast('Review submitted!', 'success');
                document.getElementById('reviewModal').classList.add('hidden');
            } catch (err) { showToast(err.message, 'error'); }
        });

        async function confirmPayment(taskId) {
            try {
                await api.put(`/payments/${taskId}/confirm`);
                showToast('Payment confirmed!', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        loadTasks();
    </script>
</body>

</html>
